name: Forge
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
packages:
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    from: "0.8.1"
schemes:
  Forge:
    build:
      targets:
        Forge: all
        ForgeUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ForgeUITests
targets:
  ForgeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Forge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.rilable.uitests
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
  Forge:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: ConvexMobile
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Rilable
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        CFBundleURLTypes:
          - CFBundleURLName: com.example.rilable
            CFBundleURLSchemes: [forge]
        NSMicrophoneUsageDescription: "Lovable uses the microphone so you can describe apps with your voice."
    settings:
      base:
        # Set these two for your own builds: any reverse-DNS bundle id you own,
        # and your Apple Developer team id (leave "" for simulator-only).
        PRODUCT_BUNDLE_IDENTIFIER: com.example.rilable
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
